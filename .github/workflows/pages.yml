name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
      - name: Generate site
        run: Rscript scripts/generate_site.R
      - name: Test, smoke check, and README assets
        run: |
          Rscript test/runtests.R
          Rscript scripts/smoke_check.R
          Rscript scripts/render_readme_assets.R
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
